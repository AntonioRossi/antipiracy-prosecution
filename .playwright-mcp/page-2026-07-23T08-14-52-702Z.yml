        - heading "Detailed description of Preferred Embodiments" [level=3] [ref=f2e572]:
          - generic [ref=f2e573]: S063
          - text: Detailed description of Preferred Embodiments
        - paragraph [ref=f2e574]:
          - generic [ref=f2e575]: S064
          - text: The present invention innovative approach to combating Colluding Redistribution (CR) attacks does not (only) involve traditional watermarking but rather employs a sophisticated method of creating unique "mates" or variations of the streamed video content. This uniqueness is achieved by programmatically altering the timing of camera cuts within the video, as recorded in in a structured list 103 of instructions describing edits. Each spectator, therefore, receives a slightly different version of the event, with these differences being subtle enough not to detract from the viewing experience but significant enough to act as a unique identifier or "fingerprint" for each distributed stream.
