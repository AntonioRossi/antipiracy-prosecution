          - generic [ref=f2e1019]: S172
          - text: With a single mate generation, the number of different videos is doubled at every camera cut, that results in a power of 2 being applied to said number of videos. Additional mates raise the value of said power applied to the number of different videos, for example, with two mates a power of 3 is applied. Thus, it is easy to calculate that, by using a couple of mates in addition to the reference video, the number of different videos would be 1 million after only 100 camera cuts (100 to the power of 3).
