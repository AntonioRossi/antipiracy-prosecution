        - paragraph [ref=f2e605]:
          - generic [ref=f2e606]: S075
          - text: "In some embodiments of the present invention said artificial intelligence algorithm is a camera cuts detection algorithm 131 which employs AI to determine timing of said camera cuts and said detection apparatus comprises: a detection component 130 running said detection algorithm 131, and a retrieval component 140 which searches said ledger 122."
        - paragraph [ref=f2e607]:
          - generic [ref=f2e608]: S076
          - text: With reference to FIG. 1, a general view of a system 100 according to the present invention is shown. In FIG. 1 as in the description that follows, the best embodiment of the present invention to date is illustrated.
        - paragraph [ref=f2e609]:
          - generic [ref=f2e610]: S077
          - text: "The invention relates to an anti-piracy system 100 identifying audio video streaming content distributed. Said anti-piracy system 100 that alters camera cuts related to one or more reference audio-videos content 1 comprises:"
        - list [ref=f2e611]:
          - listitem [ref=f2e612]:
            - generic [ref=f2e613]: S078
            - text: said set of cameras 101 capturing a scene/event from diverse viewpoints;
            - 'button "Indexed by 1 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · item 6" [ref=f2e614] [cursor=pointer]': ◂ 1
          - listitem [ref=f2e615]:
            - generic [ref=f2e616]: S079
            - text: said audio-video production pipeline 102 receiving, processing, and managing content from the cameras 101. A director uses said pipeline 102 to command real-time switching between said cameras 101 based on creative or strategic decision-making. Said real time switches are herein called "camera cuts". Said pipeline 102 records all camera cut timings and transitions by inserting corresponding time codes in a list 103 of instructions describing edits. A time code is a sequence of numeric codes that uniquely identify each frame of video or segment of audio within a stream. They are to synchronize, index, and access specific points in an audio-video production, enabling precise editing, playback, traceability, and content management. In the context of the present invention, time codes are embedded alongside camera cuts and transitions to compose a precise list for editing purposes, marking the exact moments when these edits occur within the content;
            - 'button "Indexed by 2 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · item 7" [ref=f2e617] [cursor=pointer]': ◂ 2
          - listitem [ref=f2e618]:
            - generic [ref=f2e619]: S080
            - text: said mate creation component 110, inside said pipeline 102, which automatically applies variations to the time code of any camera cut recorded in said list 103 originating one or more unique mates 111 of the reference audio-video content 1. In the context of the present invention reference is made to an ensemble 112 which is a combination of both the reference audio-video content 1 and its mates 111. Each mate 111 is characterized by subtle differences in the sequence and timing of camera cuts, rendering each version uniquely distinguishable from others;
            - 'button "Indexed by 3 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · item 8" [ref=f2e620] [cursor=pointer]': ◂ 3
          - listitem [ref=f2e621]:
            - generic [ref=f2e622]: S081
            - text: said set of transcoding components 120 which segment said ensemble 112 in chunks 113 for the distribution to end users 2 (also called in the following spectators 2 or users 2) as optimized chunks 113 through a Content Delivery Network - CDN enabling adaptive streaming fruition by the spectators. The transcoding components 120 generate a set of different manifest files 121 tailored to end user devices and network conditions. Manifest files 121 allow spectator's video players to use the most suitable sequence of chunks 113 for the spectator's fruition of the event. Said set of different manifest files 121 points to unique interleaved combinations of said chunks 113 of the ensemble 112;
            - 'button "Indexed by 9 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · item 9" [ref=f2e623] [cursor=pointer]': ◂ 9
          - listitem [ref=f2e624]:
            - generic [ref=f2e625]: S082
            - text: said ledger 122 which contains records related to said set of different manifest files 121 and the end users/spectators 2 receiving one manifest file 121. Said ledger 122 identifies which end user 2 or group of end users 2 received a certain and/or a certain set of manifest files 121;
            - 'button "Indexed by 8 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · item 10" [ref=f2e626] [cursor=pointer]': ◂ 8
          - listitem [ref=f2e627]:
            - generic [ref=f2e628]: S083
            - text: said detection component 130 detects a pirate (unauthorized) webcasting of the event. Said detection component 130 runs a camera cuts detection algorithm 131 which analyzes the timings of said camera cuts in the pirate webcasting and devises time codes. The detection algorithm 131 proceeds to build one or more reconstructed manifest files 121' from said devised time codes;
            - 'button "Indexed by 6 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · item 11" [ref=f2e629] [cursor=pointer]': ◂ 6
          - listitem [ref=f2e630]:
            - generic [ref=f2e631]: S084
            - text: said retrieval component 140 which searches in the ledger 122 which spectator or group of spectators received one or more manifest files 121 that are equal to the reconstructed manifest files 121'. The retrieval component 140 identifies an end user 2 account, or a set of end user 2 accounts, used by the pirate for accessing the audio video content related to the event finding manifest files 121 that are equal to said reconstructed manifest files 121'.
            - 'button "Indexed by 5 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · item 12" [ref=f2e632] [cursor=pointer]': ◂ 5
        - paragraph [ref=f2e633]:
          - generic [ref=f2e634]: S085
          - text: Said manifest file 121 is central to the adaptive streaming process. After the video is encoded into various quality levels and segmented, the manifest file 121 is generated to list these segments along with metadata such as bitrate, resolution, and segment duration. A streaming player uses the manifest file 121 to decide which segments to download based on the spectator's current network speed and device resolution. The player continuously requests segments as listed in the manifest file 121, ensuring that the spectator receives a continuous and optimized stream. This adaptive process is dynamic, allowing for real-time adjustments to the stream quality as network conditions change. In adaptive streaming the manifest files 121 for both the reference video content 1 and the video modified with mates 111 will indeed point to sets of chunks 113 of equal duration. The key difference arises in how these manifest files 121 reference specific chunks 113, especially for the parts of the video where edits or modifications have been made in the "mate version" to incorporate anti-piracy measures.
          - 'button "Indexed by 8 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶10" [ref=f2e635] [cursor=pointer]': ◂ 8
        - paragraph [ref=f2e636]:
          - generic [ref=f2e637]: S086
          - text: The focus of the invention is its ability to trace a specific version of the content 1 distributed to and accessed by each spectator, facilitating an advanced mechanism for piracy detection. This is achieved by creating a multitude of mates 111, each with slight variations, which are then associated with different manifest files 121 distributed to the end users 2.
          - 'button "Indexed by 2 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶11" [ref=f2e638] [cursor=pointer]': ◂ 2
        - paragraph [ref=f2e639]:
          - generic [ref=f2e640]: S087
          - text: The system 100 in preferred embodiments is used to generate multiple mates 111, each potentially leading to the multiplication of distinct manifest files 121. Such a diversified distribution of content 1 versions substantially enhances the system's 100 capacity to detect and trace the origins of pirated content, enabling the pinpointing of the specific spectator account or group of accounts utilized by pirates for sourcing and illegally replicating the content 1.
        - paragraph [ref=f2e641]:
          - generic [ref=f2e642]: S088
          - text: "Every time a new mate 111 is created from a camera cut, it not only creates a new version of the content 1 but also necessitates the generation of a new manifest file 121 for that version. Starting with a single version of the content 1 (the original), creating a mate 111 for a camera cut results in two distinct versions: the original and the mate version. For each of these versions, a unique manifest file 121 is needed to guide the playback of that specific version, thus doubling the total number of manifest files 121. The process of doubling doesn't stop at the first camera cut. Each subsequent camera cut for which a mate 111 is created repeats this doubling effect. For example, if a mate 111 is created for a second camera cut, the total number of content versions (and by extension, manifest files 121) doubles again. This is because each existing version can spawn a new mate 111, each requiring its own manifest file 121. This exponential increase in the number of unique manifest files 121 significantly enhances the content's 1 protection against piracy. By distributing these unique versions to different viewers or groups, the system can track and identify the source of any pirated content with remarkable precision. Each manifest file 121 serves as a unique identifier, linking pirated content back to its original source among the viewers, thus enabling targeted anti-piracy measures. The invention leverages the inherent complexity of video production and distribution, turning every camera cut into an opportunity to enhance content security through this exponential generation of unique manifest files 121, thereby offering a robust and scalable solution to combating digital piracy."
          - 'button "Indexed by 1 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶13" [ref=f2e643] [cursor=pointer]': ◂ 1
        - paragraph [ref=f2e644]:
          - generic [ref=f2e645]: S089
          - text: In some embodiments of the present invention, the structured list 103 of instructions describing edits is an Edit Decision List (EDL). An EDL file contains a structured list of instructions describing edits to be performed on said reference audio-video content 1. The primary function of the EDL file is to guide the reconstruction of a sequence for editing or conforming purposes. Each entry in an EDL file comprises a source material reference which identifies the original media file (e.g., filename, reel name, tape number) and said time code. Said EDLs can be plain text files, with specific formatting and syntax depending on the standard being used (e.g., CMX3600, AAF, XML), or other format files.
          - 'button "Indexed by 4 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶14" [ref=f2e646] [cursor=pointer]': ◂ 4
        - paragraph [ref=f2e647]:
          - generic [ref=f2e648]: S090
          - text: The EDL file meticulously records all camera cut timings and transitions that occur during the shooting of an event. This includes the specific points in time when the director, operating within the audio-video production pipeline, decides to switch between cameras based on creative or strategic decision-making. Within the framework of the invention, the EDL file functions as a comprehensive record, systematically documenting every camera cut timing and transition. This meticulous recording and standardization process ensures that each piece of content can be uniquely identified and managed, facilitating the creation of mates 111.
        - paragraph [ref=f2e649]:
          - generic [ref=f2e650]: S091
          - text: In the context of live streaming events, the live production is typically switched live, meaning that the director is choosing the shots in real time and there is no recording to edit. However, once the event is over, a recording of the stream can be edited to create a highlights package or other derivative product. This is where an EDL file can be helpful. The editor can use the EDL file to quickly and easily make the edits that were specified by the director or producer. This can save a lot of time and effort, especially if the recording is long or complex.
          - 'button "Indexed by 1 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶16" [ref=f2e651] [cursor=pointer]': ◂ 1
        - paragraph [ref=f2e652]:
          - generic [ref=f2e653]: S092
          - text: Said structured list 103 such as an EDL used for live event direction and production allows the implementation of automation systems that can use instructions based on timecode or external triggers to perform camera switching. These instructions can be considered similar to a simplified EDL format, focusing mainly on camera selection changes based on timing. This is particularly favorable when used in scenarios where repetitive or predictable switching patterns are required (e.g., following a speaker with pre-determined camera positions). The instructions can further dictate when to activate/deactivate graphics, transitions between them, and other visual elements helping synchronize effects with live camera cuts.
        - paragraph [ref=f2e654]:
          - generic [ref=f2e655]: S093
          - text: "While the similarity between the structured list 103 of instructions describing edits and an EDL file (or a true EDL file if present in the pipeline) is pivotal to the current invention, the system 100 is designed with a degree of flexibility to integrate alternative technologies that offer substantial functionalities akin to those provided by EDL files. These technologies include, in some embodiments of the present invention: advanced metadata frameworks, dynamic content management systems, and/or next generation editing protocols that facilitate the recording, standardization, and manipulation of video content in ways that support the creation of unique content variations for anti-piracy purposes."
        - paragraph [ref=f2e656]:
          - generic [ref=f2e657]: S094
          - text: In some embodiments of the present invention, the system 100 is implemented within a computing environment that encompasses at least a processor, at least a memory, at least a storage hardware. Said computing environment is capable of executing instruction code.
          - 'button "Indexed by 5 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶19" [ref=f2e658] [cursor=pointer]': ◂ 5
        - paragraph [ref=f2e659]:
          - generic [ref=f2e660]: S095
          - text: In other embodiments, the system 100 can be deployed across one or more server clusters, specifically engineered to manage scalable processing loads efficiently.
          - 'button "Indexed by 1 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶20" [ref=f2e661] [cursor=pointer]': ◂ 1
        - paragraph [ref=f2e662]:
          - generic [ref=f2e663]: S096
          - text: The precise manner in which the components of the system 100 are implemented and integrated can vary significantly, contingent upon the specific equipment and infrastructural elements already in place within the facility. A person having ordinary skill in the art, equipped with the teachings provided herein, would be capable of devising the optimal implementation strategy for deploying the components of the system 100 such as the mate creation component 110 for the intended purpose within any particular embodiment. Therefore, such precise manners of implementation will not be described in detail.
        - paragraph [ref=f2e664]:
          - generic [ref=f2e665]: S097
          - text: With a typical EDL file (a particular well-known implementation of the general concept of a structured list 103 of instructions describing audio and video edits) serving as a reference for illustrative purposes, the mate creation component 110 within the pipeline 102 programmatically applies variations to the time codes of any camera cut. A non-limiting example of the mate creation component 110 operational framework is provided in Example 1.
        - paragraph [ref=f2e666]:
          - generic [ref=f2e667]: S098
          - text: Unlike conventional systems, where a singular video stream is prepared for distribution, this invention introduces a multi-layered strategy that integrates additional transcoding and mixing components to manage and distribute multiple variations (mates 111) of the original content alongside the reference video content 1.
          - 'button "Indexed by 1 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶23" [ref=f2e668] [cursor=pointer]': ◂ 1
        - paragraph [ref=f2e669]:
          - generic [ref=f2e670]: S099
          - text: "In some preferred embodiments of the present invention as the one shown in FIG. 3, the transcoding components 120 of the system 100 further comprise a mixing component 123. The mixing component 123 is seamlessly integrated within the digital content management pipeline, specifically following the transcoding phase. The mixing component 123 is architected for deployment in a computing environment that includes a processor, memory, and storage, all capable of executing instruction code, or across one or more server clusters tailored for efficiently managing scalable processing loads. Through this strategic implementation, the mixing component 123 significantly enhances content security and traceability by intelligently amalgamating reference and mate chunks 113 of video content and generating variegated manifest files 121 for content distribution. This not only fosters a novel approach to preventing piracy but also ensures a tailored viewing experience for each user 2, embedding unique identifiers within the content to facilitate the detection and tracing of pirated versions. The mixing component 123 performs two primary functions: the integration of chunks 113 from the reference video with those from one or more \"mate streams\", and the generation of unique manifest files 121, ensuring that each viewer is presented with a slightly different version of the event. Said mixing component 123 dynamically associates groups of users 2 with distinct manifest files 121, progressively assigning individualized manifest files 121 to each user 2 as the system 100 generates a sufficient variety of cuts. The operational mechanics of said mixing component 123, including the strategic interleaving of video chunks 113 to create unique viewer experiences and the subsequent generation of traceable content fingerprints, are elucidated through Example 4."
          - 'button "Indexed by 1 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶24" [ref=f2e671] [cursor=pointer]': ◂ 1
        - paragraph [ref=f2e672]:
          - generic [ref=f2e673]: S100
          - text: The inclusion of said mixing component 123 into the content distribution pipeline significantly enhances the system's ability to combat piracy. By distributing variegated versions of the content 1, the system 100 creates a unique "fingerprint" for each spectator or group of spectators. This makes it possible to trace pirated content back to its original source, as the unique combination of chunks 113 can be matched to a specific manifest file 121 distributed to a particular spectator or group. The system 100 dynamically adjusts the content each spectator receives, complicating attempts by pirates to redistribute the content. Since each version is slightly different, matching pirated content with its source becomes a powerful tool in identifying and mitigating unauthorized distribution. The ledger 122 and detection components 130, in conjunction with the varied manifest files 121, enable precise tracking and identification of piracy sources. By reconstructing the manifest file 121 used in pirated webcasting, the system 100 can pinpoint the specific spectator account or group responsible for the unauthorized distribution. The invention's innovation lies not only in the generation of unique content variations through the list 103 (such as EDL file) but also in the strategic management and preservation of the resultant diverse manifest files 121, each corresponding to different content variations distributed to viewers.
        - paragraph [ref=f2e674]:
          - generic [ref=f2e675]: S101
          - text: The process of storing and archiving these manifest files 121 is crucial for enabling the precise tracking and identification of the source of pirated content. By associating each unique manifest file 121 with specific spectators or group distributions, the system establishes a direct link between the content received by viewers and the potential unauthorized redistribution of that content.
          - 'button "Indexed by 1 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶26" [ref=f2e676] [cursor=pointer]': ◂ 1
        - paragraph [ref=f2e677]:
          - generic [ref=f2e678]: S102
          - text: For the purposes of data persistence, the system 100 is designed to be agnostic with respect to the underlying database technology utilized for storing these critical data elements. Those skilled in the art will appreciate that any contemporary or future database management system (DBMS) could be employed to achieve the objectives of efficient data storage, retrieval, and management. Some preferred embodiments include relational databases, NoSQL databases, or even more advanced distributed database systems, each selected based on criteria such as scalability, performance, security, and the specific requirements of the content distribution and piracy detection framework.
        - paragraph [ref=f2e679]:
          - generic [ref=f2e680]: S103
          - text: Furthermore, in scenarios where immutability and decentralization are paramount, particularly in the context of forensic analysis and the establishment of irrefutable evidence of piracy, blockchain technology presents a compelling solution.
        - paragraph [ref=f2e681]:
          - generic [ref=f2e682]: S104
          - text: In preferred embodiments of the present invention as the one shown in FIG. 3, the system 100 further comprises a blockchain registration component 150. The immutable ledger characteristic of blockchain provides a secure, tamper-evident environment for recording transactions related to the distribution of manifest files 121 and their associated spectator identifications. This decentralized approach not only enhances the security and traceability of the distributed content but also introduces a level of transparency and accountability that is highly beneficial in legal contexts. Said blockchain registration component 150 reads said manifest files 121 and the respective end users 2 in said ledger 122. By leveraging said blockchain registration component 150 for the storage of manifest file 121 distributions and their subsequent retrieval during piracy accusations, the system 100 benefits from the blockchain's inherent properties of immutability, decentralization, and consensus-based verification. This ensures that every transaction related to content distribution is recorded in a manner that is both unalterable and verifiable, providing a strong foundation for legal proceedings against piracy.
        - paragraph [ref=f2e683]:
          - generic [ref=f2e684]: S105
          - text: According to some preferred embodiments of the present invention as the one shown in FIG. 2, the production pipeline 102 further comprises an advanced analytics component 104. Said advanced analytics component 104 comprises machine learning algorithms predicting and preemptively counteracting potential piracy activities by adjusting the time code variations of camera cuts and the configuration of the unique content mates 111, based on historical data patterns and piracy attempt profiles. Said advanced analytics component 104 sends said time code variations and said mates 111 configuration to said mate creation component 110.
        - paragraph [ref=f2e685]:
          - generic [ref=f2e686]: S106
          - text: Said advanced analytics component 104 is used for video comparison and operates within an advanced computing environment. This environment is provisioned with not only a processor, adequate GPU resources specifically tailored for running AI and machine learning tasks, memory, and storage necessary for executing complex instruction code, but also it is designed to be deployed on one or more server clusters. These clusters are adept at managing scalable processing loads, ensuring efficiency and responsiveness. Such a computing infrastructure is meticulously calibrated to handle the intensive computational demands that are characteristic of the video analytics processes, particularly those that involve advanced AI algorithms and machine learning techniques. The adaptability of the advanced analytics component 104 allows it to tackle a variety of workload requirements, making it an integral part of the invention's capability to identify and combat piracy across diverse digital content distribution scenarios.
        - paragraph [ref=f2e687]:
          - generic [ref=f2e688]: S107
          - text: In some embodiments of the present invention, said advanced analytics component 104 uses a well-known automated video comparison process, pertaining to the realm of scene change detection algorithms. This process is specifically designed to compare a "mate streaming video" (basic content 1 which has been modified using mates 111) with a reference video content 1 to accurately identify the specific manifest file 121 or "fingerprint" derived from alterations in camera cuts. A preferred way in which said advanced analytics component 104 carries out said video comparison process is provided in Example 5.
          - 'button "Indexed by 3 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶32" [ref=f2e689] [cursor=pointer]': ◂ 3
        - paragraph [ref=f2e690]:
          - generic [ref=f2e691]: S108
          - text: In a preferred embodiment of the present invention, a single time code variation is applied at each director-commanded camera cut to ensure each content mate remains unique and traceable.
          - 'button "Indexed by 1 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶33" [ref=f2e692] [cursor=pointer]': ◂ 1
        - paragraph [ref=f2e693]:
          - generic [ref=f2e694]: S109
          - text: In a preferred embodiment of the present invention, the camera cuts detection algorithm 131 compares the reference audio-video content 1 with the pirate webcasting video using a perceptual hash method. In some preferred embodiment of the present invention, the camera cuts detection algorithm 131 compares the reference audio-video content 1 with the pirate webcasting video further using a fuzzy matching method.
          - 'button "Indexed by 1 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶34" [ref=f2e695] [cursor=pointer]': ◂ 1
        - paragraph [ref=f2e696]:
          - generic [ref=f2e697]: S110
          - text: Some embodiments of the present inventions employ both the perceptual hash method and the fuzzy marching method as described in Example 5.
        - paragraph [ref=f2e698]:
          - generic [ref=f2e699]: S111
          - text: Specifically, the scope of the invention extends to encompass machine learning algorithms for image and video recognition and advanced signal processing methods for feature extraction and comparison. Machine learning algorithms, especially those leveraging deep learning architectures, are adept at recognizing distinct features or patterns within video content. These algorithms offer powerful capabilities for matching and identifying discrepancies between reference videos and distributed content, even in the presence of alterations such as noise or overlays. Similarly, signal processing techniques can perform detailed analyses of video content, extracting unique features that persist across varied versions of the content, thus enabling precise comparisons.
        - paragraph [ref=f2e700]:
          - generic [ref=f2e701]: S112
          - text: In some embodiments of the present invention, while digital watermarking is recognized as prior art and not the primary focus of this invention, digital watermarking is employed as a complementary technology within the anti-piracy framework. This synergy between the proposed methods and digital watermarking further enhances the robustness and effectiveness of the system in protecting digital content against unauthorized use. This inclusion ensures that the anti-piracy system 100 is not only comprehensive but also adaptable to future technological advancements and methodologies in content comparison and piracy detection. The invention, therefore, remains open to integrating a wide spectrum of technologies deemed appropriate by those skilled in the art for achieving its objectives, both currently and in the future.
        - paragraph [ref=f2e702]:
          - generic [ref=f2e703]: S113
          - text: Two typical piracy attacks are the Naïve Redistribution (NR) and the Colluding Redistribution (CR). The present invention combats NR attacks through its unique mate creation component 110, which introduces slight variations at the time codes of camera cuts. Said variations, although minimal and visually insignificant to preserve quality, are enough to uniquely mark each distributed copy of the content. Should an attacker attempt to redistribute a received copy, even after applying common signal processing operations like scaling, Gaussian noising, or using a median filter, the embedded unique variations would always allow the identification and tracking of the pirated copy back to its source. This capability is further enhanced by the use of perceptual hash and fuzzy matching methods for content comparison, making the detection of altered content feasible. In the case of CR attacks, where several attackers collaborate to mix different copies to evade detection, the system's 100 approach is multifaceted. Firstly, the unique variations applied to each segment of the content (as facilitated by the mate creation component 110) ensure that even when colluders mix different copies, each segment can still be traced back to its original distribution. The ledger 122 and the detailed recording of each unique combination of chunks 113 distributed to end users 2 enable the identification of specific end user 2 accounts involved in the collusion. The system's strategy of distributing content via unicasting and employing adaptive streaming further complicates colluders' ability to mix and match content seamlessly. Each piece of content is tailored to specific end user 2 conditions and devices, making it harder for colluders to create a universally distributable pirated copy without leaving traces that can be detected by the system's monitoring components. While much of the present disclosure focuses on countering collusion attacks (where multiple pirates merge content segments from distinct versions to obscure embedded watermarks or fingerprints) the underlying principles of the invention are equally adaptable to a wide range of other existing or yet-to-emerge piracy tactics. For example, sophisticated signal-processing approaches, AI-based watermark removal, or even future attack vectors that exploit novel compression schemes can all be addressed by leveraging the core mate-creation and distribution mechanism described. By generating multiple subtly distinguishable versions of the same reference audio-video content 1 and systematically associating these versions with end users 2 accounts, the invention provides a versatile infrastructure for pinpointing the source of piracy, regardless of how the pirates attempt to disguise or remix the content 1. Consequently, the person skilled in the art will readily understand how to apply the same technique not only to mitigate collusion-based threats but also other known and unforeseen attacks, simply by adjusting the manner in which variations are introduced, tracked, and detected. These adaptations remain within the spirit and scope of the invention as claimed.
          - 'button "Indexed by 2 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶38" [ref=f2e704] [cursor=pointer]': ◂ 2
        - paragraph [ref=f2e705]:
          - generic [ref=f2e706]: S114
          - text: According to some embodiments of the present invention, the system 100 further comprises a set of pipeline components in said production pipeline 102 overlaying additional audio and/or video elements to the combination of both the reference audio-video content 1 and its mates 111. In some embodiments of the present invention, said additional elements are nonexistent in the reference audio-video content 1.
          - 'button "Indexed by 2 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶39" [ref=f2e707] [cursor=pointer]': ◂ 2
        - paragraph [ref=f2e708]:
          - generic [ref=f2e709]: S115
          - text: According to some embodiments of the present invention, said detection apparatus is using a probabilistic fingerprinting algorithm.
        - paragraph [ref=f2e710]:
          - generic [ref=f2e711]: S116
          - text: "According to some embodiments of the present invention, said detection component 130 is using a probabilistic fingerprinting algorithm. Preferably, said probabilistic fingerprinting algorithm is Tardos Fingerprinting algorithm [Tardos, G.: \"Optimal probabilistic fingerprint codes\" In: Proceedings of the 35th Annual ACM Symposium on Theory of Computing (STOC), pp. 116–125 (2003)]."
          - 'button "Indexed by 3 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶41" [ref=f2e712] [cursor=pointer]': ◂ 3
        - paragraph [ref=f2e713]:
          - generic [ref=f2e714]: S117
          - text: The Tardos fingerprinting algorithm, as well as its derivatives, plays a crucial role in the detection and accusation of piracy. This algorithm is renowned for its theoretical foundations in combating collusion attacks, where multiple users 2 combine their copies to create a pirated version that attempts to obscure the origin of the content. The original Tardos algorithm is a probabilistic fingerprinting algorithm designed to be collusion-secure, meaning it maintains the ability to trace back to the original users 2 even if a group of users 2 collude to create a composite pirated copy.
        - paragraph [ref=f2e715]:
          - generic [ref=f2e716]: S118
          - text: According to some embodiments of the present invention, said probabilistic fingerprinting algorithm comprise
          - strong [ref=f2e717]: dynamic Tardos fingerprinting algorithms
          - text: which adapt the original Tardos algorithm to accommodate dynamic content distribution environments, such as streaming media, where content is not static and changes over time. Said dynamic Tardos fingerprinting algorithms ensure that the fingerprints embedded in the content are robust against collusion while minimizing the impact on content quality.
        - paragraph [ref=f2e718]:
          - generic [ref=f2e719]: S119
          - text: According to some embodiments of the present invention, said probabilistic fingerprinting algorithm comprise a
          - strong [ref=f2e720]: binary Tardos fingerprinting algorithm
          - text: which simplifies the original Tardos algorithm to work with binary codes, making it more suitable for digital content. This approach maintains the collusion resistance of the original Tardos algorithm while simplifying implementation and reducing computational overhead.
        - paragraph [ref=f2e721]:
          - generic [ref=f2e722]: S120
          - text: According to some embodiments of the present invention, said probabilistic fingerprinting algorithm comprise
          - strong [ref=f2e723]: segmented Tardos algorithms
          - text: which segment the content into parts and applying unique Tardos fingerprints to each segment. It enhances the granularity of tracking and identification, allowing for more precise localization of the pirated content segments and, consequently, the colluders.
          - 'button "Indexed by 1 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶45" [ref=f2e724] [cursor=pointer]': ◂ 1
        - paragraph [ref=f2e725]:
          - generic [ref=f2e726]: S121
          - text: According to some embodiments of the present invention, said probabilistic fingerprinting algorithm comprise
          - strong [ref=f2e727]: compressed sensing Tardos fingerprinting algorithms
          - text: to reduce the size of the fingerprints without compromising the detection and accusation capabilities. Said compressed sensing Tardos fingerprinting algorithms are particularly useful for high-bandwidth content, such as HD video, where embedding large fingerprints could be challenging.
        - paragraph [ref=f2e728]:
          - generic [ref=f2e729]: S122
          - text: According to some embodiments of the present invention, said probabilistic fingerprinting algorithm comprise
          - strong [ref=f2e730]: quantum Tardos fingerprinting algorithms
          - text: which apply the principles of quantum computing to Tardos fingerprinting, significantly enhancing security against collusion and making the scheme resilient against quantum computing attacks.
        - paragraph [ref=f2e731]:
          - generic [ref=f2e732]: S123
          - text: According to some embodiments of the present invention, said probabilistic fingerprinting algorithm comprise
          - strong [ref=f2e733]: Machine Learning-Enhanced Tardos fingerprinting algorithms
          - text: . The employment of machine learning algorithms optimizes the generation and embedding of Tardos codes, improving resilience against sophisticated collusion attacks. By learning from past attacks, this approach dynamically adjusts the fingerprinting strategy to address the evolving piracy tactics.
        - paragraph [ref=f2e734]:
          - generic [ref=f2e735]: S124
          - text: According to some embodiments of the present invention, said probabilistic fingerprinting algorithm comprise
          - strong [ref=f2e736]: Distributed Tardos fingerprinting algorithms
          - text: which are specifically designed for decentralized content distribution networks, such as peer-to-peer systems, where traditional centralized fingerprinting approaches are less effective. It allows for the robust tracking of content across distributed networks, enhancing the ability to detect and trace pirated content back to the source.
        - paragraph [ref=f2e737]:
          - generic [ref=f2e738]: S125
          - text: Each of these algorithms derives from the original Tardos fingerprinting scheme, building upon its foundational strengths to address specific challenges in content protection. They highlight the adaptability and ongoing relevance of the Tardos algorithm in the ever-evolving domain of digital content piracy, offering a spectrum of tools for copyright holders to safeguard their intellectual property effectively.
        - paragraph [ref=f2e739]:
          - generic [ref=f2e740]: S126
          - text: Advantageously, in the present invention, a comprehensive array of anti-piracy mechanisms, inclusive of all aforementioned derivatives and innovations based on the Tardos fingerprinting algorithms, can be employed. By integrating dynamic Tardos fingerprinting algorithms, binary Tardos fingerprinting, segmented Tardos codes, compressed sensing Tardos fingerprinting, quantum Tardos fingerprinting, machine learning-enhanced Tardos fingerprinting, and distributed Tardos fingerprinting within its framework, the invention offers a multi-layered defense against collusion and unauthorized distribution. This strategic amalgamation not only capitalizes on the strengths of each method to ensure superior protection of copyrighted material but also underscores the invention's adaptability to diverse digital distribution environments and its readiness to counter advanced piracy tactics. Furthermore, a person skilled in the art could readily adapt and incorporate any other existing methods and algorithms of a similar nature to enhance the identification and tracking capabilities offered by this invention.
        - paragraph [ref=f2e741]:
          - generic [ref=f2e742]: S127
          - text: According to some embodiments of the present invention, the streamed content in the form of said chunks 113 is distributed using unicasting.
          - 'button "Indexed by 2 claim fragment(s) of this edition: Detailed description of Preferred Embodiments · ¶52" [ref=f2e743] [cursor=pointer]': ◂ 2
        - paragraph [ref=f2e744]:
          - generic [ref=f2e745]: S128
          - text: In other embodiments of the present invention, the elaboration of the key elements pertinent to adaptive streaming, integrates Multicast Adaptive Bitrate Streaming (Multicast ABR) technology. This innovative approach complements the traditional Unicast Adaptive Streaming by enabling the efficient distribution of video content to multiple users 2 over a single network transmission. Multicast ABR works by sending a single stream from the server, which is then accessed by multiple clients or devices simultaneously, significantly reducing the bandwidth requirements compared to individual unicast streams for each viewer. This technology is particularly advantageous in scenarios where bandwidth conservation is crucial, such as in live event streaming or broadcasting over constrained networks. Multicast ABR seamlessly integrates with the existing infrastructure of Adaptive Bitrate Streaming by dynamically adjusting the quality of the video stream to match the varying network conditions and device capabilities of multiple viewers, thereby maintaining the principle of delivering the optimal viewing experience for each user 2.
        - paragraph [ref=f2e746]:
          - generic [ref=f2e747]: S129
          - text: It is an inherent aspect of the present invention that once the source account, or group of source accounts in the case of collusion attacks, is identified through the detection component 130 and the retrieval component 140, the provider responsible for distributing the event possesses the capacity to take immediate remedial action. In some embodiments of the present invention, the provider can exercise the option to disable any accounts implicated as sources of the unauthorized redistribution. This decisive action not only serves as a deterrent against future piracy but also reinforces the integrity of the content distribution framework. The ability to swiftly pinpoint and neutralize the origin of pirated content is a crucial feature of the system, ensuring that the content provider retains full control over the distribution and maintains the exclusivity of the viewing experience for legitimate users 2. In some embodiments of the present invention, said disabling of accounts implicated as sources of unauthorized redistribution is automatically operated by the system 100 which comprises algorithms capable of automatically perform such operations when a confirmed unauthorized redistribution is given by said detection component 130 and the retrieval component 140.
        - paragraph [ref=f2e748]:
          - generic [ref=f2e749]: S130
          - text: Thus, the invention not only detects and identifies the source of piracy with high precision but also provides the content provider with the necessary tools to enforce copyright policies and protect against revenue loss effectively.
        - paragraph [ref=f2e750]:
          - generic [ref=f2e751]: S131
          - text: Enhanced by the system's ability to track pirated copies, pinpoint them utilizing scene change detection algorithms, and correlate them to their initial distribution, a comprehensive, multi-pronged defence against unauthorized content dissemination is established. This pioneering synthesis of dynamic content creation and distribution methodologies with compatibility for traditional protection mechanisms equips copyright owners with an extensive arsenal to deter piracy, all the while preserving the quality of the legitimate viewer's experience.
