        - heading "5. International Application Text" [level=1] [ref=f2e431]:
          - generic [ref=f2e432]: S003
          - text: 5. International Application Text
        - paragraph [ref=f2e433]:
          - generic [ref=f2e434]: S004
          - strong [ref=f2e435]: AI – DRIVEN SYSTEM AND METHOD FOR CONTENT DIFFERENTIATION AND PIRACY TRACEABILITY IN STREAMING MEDIA
        - heading "Description" [level=2] [ref=f2e436]:
          - generic [ref=f2e437]: S005
          - text: Description
        - heading "Field of the invention" [level=3] [ref=f2e438]:
          - generic [ref=f2e439]: S006
          - text: Field of the invention
        - paragraph [ref=f2e440]:
          - generic [ref=f2e441]: S007
          - text: The present invention relates to the domain of digital content management, with a specific emphasis on pioneering methods for safeguarding audio-video streaming content against unauthorized dissemination and piracy. This invention describes a system which identifies, manages, and secures both live and pre-recorded streaming content as it navigates through the complexities of contemporary digital distribution networks. Utilizing a holistic approach that spans the capture, processing, and distribution of audio-video content, the system integrates anti-piracy technologies directly into the production and distribution workflow.
        - heading "Background of the Invention" [level=3] [ref=f2e442]:
          - generic [ref=f2e443]: S008
          - text: Background of the Invention
        - paragraph [ref=f2e444]:
          - generic [ref=f2e445]: S009
          - text: In the realm of events broadcasting, the journey from capturing the essence of an event to delivering it into the homes of viewers worldwide, live or recorded, encompasses a meticulously crafted workflow, deeply rooted in both tradition and technological advancement. This process begins in the planning stages, where producers and directors conceptualize the broadcast's coverage strategy, meticulously selecting camera placements to capture the dynamism and pivotal moments of the event. They also outline the integration of unique content elements that might enhance the viewing experience, such as player interviews or behind-the-scenes footage.
        - paragraph [ref=f2e446]:
          - generic [ref=f2e447]: S010
          - text: Following the initial planning phase, the setup stage sees a team of skilled technicians deploying an array of cameras and audio equipment across the venue. This setup is designed to offer a multitude of perspectives, ranging from wide-angle shots that capture the event's scale to close-ups that bring viewers into the heart of the action. This strategic placement is crucial for creating an immersive viewing experience that mirrors the excitement of being present at the event.
        - paragraph [ref=f2e448]:
          - generic [ref=f2e449]: S011
          - text: Once the event is underway, camera operators spring into action, recording live footage that is immediately relayed back to the production team. This raw footage forms the backbone of the live broadcast, with the director playing a pivotal role in deciding which camera feeds are broadcast at any given moment. These real-time decisions are crucial for storytelling, allowing the director to highlight key moments, reactions, and nuances of the event as they unfold.
        - paragraph [ref=f2e450]:
          - generic [ref=f2e451]: S012
          - text: The processing phase adds another layer of complexity to the workflow. Initial edits are made, and additional elements such as graphics, commentary, and instant replays are woven into the broadcast. For events of significant complexity, an Edit Decision List (EDL) is drafted, serving as a blueprint for post-production editing. The EDL outlines the precise timing and sequence of camera cuts, ensuring that the final product is both coherent and captivating.
        - paragraph [ref=f2e452]:
          - generic [ref=f2e453]: S013
          - text: Finally, the distribution phase sees the content being prepared for consumption by a global audience. This involves transcoding the content to ensure compatibility with various platforms, segmenting it for efficient streaming, and distributing it through a content delivery network (CDN). The use of manifest files is critical here, as they guide the streaming player to deliver the best possible viewing experience based on the viewer's device capabilities and internet connection. This adaptive streaming ensures that viewers, regardless of their geographical location or the device they are using, receive a seamless and uninterrupted viewing experience.
        - paragraph [ref=f2e454]:
          - generic [ref=f2e455]: S014
          - text: Contemporary anti-piracy techniques play a vital role throughout this workflow. Watermarking and fingerprinting technologies embed invisible identifiers within the content, enabling rights holders to trace any instance of piracy back to its source.
        - paragraph [ref=f2e456]:
          - generic [ref=f2e457]: S015
          - text: Examples of systems and methods using such technologies are given in patents WO2017017603A1, WO2010044102A2, CN202455480U, CN100583750C and others.
        - paragraph [ref=f2e458]:
          - generic [ref=f2e459]: S016
          - text: Digital Rights Management (DRM) systems further protect content by controlling how it is accessed and used, preventing unauthorized sharing and viewing. Encryption and access control mechanisms safeguard the content behind secure barriers, ensuring that only authorized users can access it. Additionally, sophisticated monitoring tools and software are deployed to detect pirated content across the internet, facilitating the rapid issuance of takedown requests to remove unauthorized copies and mitigate piracy's impact.
        - paragraph [ref=f2e460]:
          - generic [ref=f2e461]: S017
          - text: This comprehensive overview of the prior art, for example in live sports broadcasting, underscores the intricate balance between capturing the thrill of live events, enhancing viewer engagement through innovative production techniques, and safeguarding the content against unauthorized use. As technology evolves, so too does the landscape of content creation, distribution, and protection, highlighting the ongoing challenge of preserving the value of intellectual property in the digital age.
        - paragraph [ref=f2e462]:
          - generic [ref=f2e463]: S018
          - text: In the intricate tapestry of live sports broadcasting and content distribution, the utilization of legacy watermarking and fingerprinting techniques stands out as both a cornerstone and a point of contention in the battle against digital piracy. These techniques, deeply ingrained in the industry's efforts to protect intellectual property, embed invisible markers or unique identifiers within the content. While they have been pivotal in tracing pirated content back to its source, several pitfalls and critical inefficiencies have surfaced, challenging their effectiveness in the modern digital landscape.
        - paragraph [ref=f2e464]:
          - generic [ref=f2e465]: S019
          - text: One of the primary limitations of traditional watermarking techniques lies in their susceptibility to sophisticated removal methods. Pirates have increasingly employed advanced signal processing techniques, such as filtering, compression, and re-encoding, to obliterate or significantly alter these watermarks, rendering them ineffective as a deterrent. This vulnerability exposes a critical gap in the defence against piracy, as the removal or alteration of watermarks not only facilitates unauthorized distribution but also obscures the traceability back to the source of the leak.
        - paragraph [ref=f2e466]:
          - generic [ref=f2e467]: S020
          - text: Fingerprinting technologies, designed to embed unique codes into individual copies of content, face similar challenges. The granularity and specificity of these fingerprints, intended to track the distribution of content to individual users, can be compromised through collusion attacks. In such scenarios, multiple users combine different segments of content, each with its own unique fingerprint, to create a composite version devoid of identifiable markers. This method effectively dilutes the fingerprint's distinctiveness, complicating efforts to pinpoint the origin of the pirated content.
        - paragraph [ref=f2e468]:
          - generic [ref=f2e469]: S021
          - text: Moreover, both watermarking and fingerprinting techniques often struggle to withstand the rigorous conditions of internet broadcasting, including variable bitrates, resolution changes, and adaptive streaming protocols. These conditions can distort or erase the embedded markers, further impeding detection efforts. Additionally, the computational overhead associated with embedding and detecting these markers can introduce latency and degrade the quality of the streaming experience for legitimate users, presenting a trade-off between content protection and user satisfaction.
        - paragraph [ref=f2e470]:
          - generic [ref=f2e471]: S022
          - text: The challenges extend beyond technical limitations, encompassing legal and privacy concerns as well. The implementation of these techniques must navigate the intricate landscape of global copyright laws, which vary significantly across jurisdictions. Furthermore, the collection and analysis of data inherent in fingerprinting technologies raise privacy concerns, necessitating a delicate balance between content protection and user rights.
        - paragraph [ref=f2e472]:
          - generic [ref=f2e473]: S023
          - text: In summary, while legacy watermarking and fingerprinting techniques have provided a foundational layer of protection against content piracy, their efficacy is increasingly undermined by a combination of technological advancements in piracy methods, inherent technical limitations, and evolving legal and ethical considerations. These pitfalls highlight the need for innovative approaches that can adapt to the dynamic nature of digital content distribution and consumption, ensuring robust protection for copyright holders without compromising the viewing experience or privacy of legitimate users.
        - heading "Summary of the invention" [level=3] [ref=f2e474]:
          - generic [ref=f2e475]: S024
          - text: Summary of the invention
        - paragraph [ref=f2e476]:
          - generic [ref=f2e477]: S025
          - text: The present invention relates to an anti-piracy system for identifying and protecting audio-video streaming content. The system of the present invention allows to capture an event from various viewpoints using a set of cameras, to process this content through an audio-video production pipeline, and to manage real-time directorial decisions to switch between camera angles.
        - heading "Technical Problem" [level=4] [ref=f2e478]:
          - generic [ref=f2e479]: S026
          - text: Technical Problem
        - paragraph [ref=f2e480]:
          - generic [ref=f2e481]: S027
          - text: The primary technical problem solved by the invention relates to the limitations of legacy watermarking and fingerprinting techniques used in content protection. These traditional methods are increasingly becoming ineffective against sophisticated piracy methods due to their susceptibility to signal processing techniques such as filtering, compression, and re-encoding, which can obliterate or significantly alter watermarks, thus facilitating unauthorized distribution and obscuring traceability back to the source of the leak. Additionally, these techniques struggle to withstand the conditions of internet broadcasting like variable bitrates, resolution changes, and adaptive streaming protocols, which can distort or erase embedded markers.
        - paragraph [ref=f2e482]:
          - generic [ref=f2e483]: S028
          - text: "Besides currently well-known piracy techniques, it is foreseeable that generative AI could be used to alter or remove watermarks from video content for piracy purposes. Here's how this might unfold:"
        - list [ref=f2e484]:
          - listitem [ref=f2e485]:
            - generic [ref=f2e486]: S029
            - strong [ref=f2e487]: "Advanced Image and Video Manipulation:"
            - text: Generative AI, particularly models trained on vast datasets of images and videos, can learn to mimic, alter, or completely remove watermarks. These models could be trained to recognize watermark patterns and then either overlay new content or subtly modify existing frames to make watermarks less noticeable or entirely invisible;
          - listitem [ref=f2e488]:
            - generic [ref=f2e489]: S030
            - strong [ref=f2e490]: "Pattern Recognition and Removal:"
            - text: AI could be designed and/or trained to specifically detect the patterns or signatures used by watermarking technologies. Once detected, these AI systems could then apply techniques to either mask these patterns or generate new frames where the watermark does not appear, effectively removing the watermark without significantly degrading the video quality;
          - listitem [ref=f2e491]:
            - generic [ref=f2e492]: S031
            - strong [ref=f2e493]: "Real-Time Processing:"
            - text: With advancements in computational power, AI could process videos in real-time, allowing for immediate watermark removal during streaming or playback. This would make piracy not only more sophisticated but also more efficient, reducing the lag or quality loss that might occur with traditional methods;
          - listitem [ref=f2e494]:
            - generic [ref=f2e495]: S032
            - strong [ref=f2e496]: "Counter-Watermarking Techniques:"
            - text: As watermarking technologies evolve to become more resilient, generative AI might evolve in parallel to develop counter-measures. For instance, AI could generate 'noise' or slight alterations that disrupt the watermark's detection while maintaining the integrity of the video content for human viewers.
        - paragraph [ref=f2e497]:
          - generic [ref=f2e498]: S033
          - text: The present invention levels the playing field by leveraging AI technologies to prevent described illicit activities where AI technologies are used for piracy purposes.
        - paragraph [ref=f2e499]:
          - generic [ref=f2e500]: S034
          - text: "The present invention further solves the following technical problems:"
        - list [ref=f2e501]:
          - listitem [ref=f2e502]:
            - generic [ref=f2e503]: S035
            - text: fingerprinting technologies, while designed to embed unique codes into individual copies of content to track distribution, face challenges from collusion attacks where pirated content is combined from different sources, diluting the distinctiveness of fingerprints and complicating efforts to pinpoint the origin of pirates;
          - listitem [ref=f2e504]:
            - generic [ref=f2e505]: S036
            - text: the computational overhead required for embedding and detecting markers can introduce latency and degrade the quality of streaming for legitimate users, highlighting a need for balancing content protection mechanisms with a seamless viewer experience.
        - paragraph [ref=f2e506]:
          - generic [ref=f2e507]: S037
          - text: These problems encapsulate the technical and ethical landscape that the proposed invention aims to navigate, highlighting a pressing need for innovative solutions that can adapt to the dynamic nature of digital content distribution and consumption, protect copyright holders efficiently without compromising the viewing experience, and address privacy concerns of legitimate users.
        - heading "Solutions and Advantageous effects of the invention" [level=4] [ref=f2e508]:
          - generic [ref=f2e509]: S038
          - text: Solutions and Advantageous effects of the invention
        - paragraph [ref=f2e510]:
          - generic [ref=f2e511]: S039
          - text: At the heart of this invention is the creation and application of distinctive content variations called "mates", produced through programmable modifications to camera cuts, and the meticulous management of these variations through an advanced content delivery framework. This framework encompasses an extensive array of components, from camera arrays capturing various angles of events, through sophisticated editing and transcoding operations, to dynamic content distribution methods that guarantee each content piece is uniquely identifiable and traceable to its origin. Additionally, the invention includes powerful detection and recovery systems designed to locate pirated content and trace it back to the initial distribution point, thereby facilitating effective enforcement of copyright protections.
        - paragraph [ref=f2e512]:
          - generic [ref=f2e513]: S040
          - text: Intersecting with key areas within the expansive field of digital content management, such as digital rights management (DRM), content delivery networks (CDN), adaptive streaming technologies, and anti-piracy measures, the present invention focuses on combating digital piracy. The present invention presents a solution that not only bolsters the security of copyrighted material but also preserves the viewing quality for legitimate audiences. The versatility and adaptability of the present system render it suitable for a broad spectrum of content types and distribution channels, ranging from live sports events and music concerts to film releases and television shows, representing a critical advancement in the ongoing endeavour to protect intellectual property in the digital age.
        - paragraph [ref=f2e514]:
          - generic [ref=f2e515]: S041
          - text: A unique aspect of this invention is the mate creation component within the pipeline, which programmatically applies variations to the time codes of camera cuts recorded in the file of the structured list of instructions describing audio video edits, generating one or more unique mates of the reference content. This process is complemented by a flexible set of additional pipeline components that overlay various audio-video elements onto the ensemble of the reference video and its mates, enhancing the content's uniqueness.
          - 'button "Indexed by 1 claim fragment(s) of this edition: Solutions and Advantageous effects of the invention · ¶3" [ref=f2e516] [cursor=pointer]': ◂ 1
        - paragraph [ref=f2e517]:
          - generic [ref=f2e518]: S042
          - text: In the foregoing description, some embodiments reference the generation of manifest files for adaptive streaming and the use of a Content Delivery Network (CDN) to distribute the reference version and its mates. It will be apparent to the person skilled in the art, however, that these specific streaming configurations are merely illustrative. The inventive system and method of creating multiple distinguishable versions by altering camera-switch timings (and subsequently detecting any unauthorized distribution based on those distinguishable features) remain applicable even if new or different streaming protocols replace traditional manifest-based architectures. For instance, emergent distribution frameworks that utilize advanced edge networks, peer-to-peer protocols, multicast adaptive bitrate streaming (Multicast ABR), or yet-to-be-developed transport layers can be readily adapted by one skilled in the art to incorporate the disclosed mate-creation and detection concepts. The core principle (namely, distributing slightly altered video versions to recipients and identifying illicit copies by comparing detectable edit patterns) does not depend upon any one CDN platform or any specific algorithm/apparatus for segmenting and delivering content. Consequently, future developments in streaming technology, including those that obviate manifest files or substantially alter how segments and metadata are managed, are to be considered within the scope of the present invention. The teachings herein provide a flexible foundation, enabling ready adaptation to evolving content-delivery paradigms without departing from the scope of the claimed invention.
        - paragraph [ref=f2e519]:
          - generic [ref=f2e520]: S043
          - text: The system also features a set of transcoding components that segment the ensemble into optimized chunks for distribution through a content delivery network (CDN), creating different manifest files tailored to individual user devices and network conditions. These manifest files enable video players to deliver the most suitable sequence of chunks for an optimal viewing experience, while unique interleaved combinations of chunks ensure the content's security.
        - paragraph [ref=f2e521]:
          - generic [ref=f2e522]: S044
          - text: An integral part of the system is a ledger that records the different manifest files and their distribution to spectators, facilitating the identification of specific users or groups based on the manifest file they received. A detection component monitors for pirated webcasting of the event, employing a scene change detection algorithm to identify the time codes of camera cuts in the pirated content. This allows for the reconstruction of the manifest file used in the piracy, enabling a retrieval component to search the ledger for matching spectators and identify the user account(s) involved in accessing the pirated content.
        - paragraph [ref=f2e523]:
          - generic [ref=f2e524]: S045
          - text: The system enhances anti-piracy measures by applying single time code variations at director-commanded camera cuts, utilizing perceptual hash and fuzzy matching methods for content comparison, and distributing content via unicasting. Additionally, the introduction of novel elements during camera cuts not existent in the reference video further complicates unauthorized replication.
          - 'button "Indexed by 1 claim fragment(s) of this edition: Solutions and Advantageous effects of the invention · ¶7" [ref=f2e525] [cursor=pointer]': ◂ 1
        - paragraph [ref=f2e526]:
          - generic [ref=f2e527]: S046
          - text: Focusing on the aspects of live streaming sports events that leverage adaptive streaming technology, there are several key elements within the pipeline that directly contribute to the streaming experience. Adaptive streaming technology, often implemented through protocols like HLS (HTTP Live Streaming) or DASH (Dynamic Adaptive Streaming over HTTP), enables the delivery of live video content to viewers in a way that adjusts in real time to their internet bandwidth and device capabilities. This ensures an optimal viewing experience by minimizing buffering and playback issues.
        - paragraph [ref=f2e528]:
          - generic [ref=f2e529]: S047
          - text: In the context of the present invention, which addresses the sophisticated management of audio-video production pipelines for live streaming of events, including sports events, a strategic approach to distribution between licensors (e.g., Italian Serie A) and licensees (e.g., DAZN, SKY) is delineated. The licensor, holding rights to the content, is responsible for the initial phases of the pipeline, including on-site communication, capture of high-quality video footage using advanced camera equipment, live event direction, and the generation of raw video feeds and audio signals. This stage may also involve the integration of live data, statistics, and the initial application of graphics and on-screen elements to enhance the broadcast. Furthermore, the licensor is tasked with creating said mates through the strategic manipulation of camera cuts as recorded in the structured list of instructions describing audio video edits.
        - paragraph [ref=f2e530]:
          - generic [ref=f2e531]: S048
          - text: "While it is common for major sporting events (or other large-scale events) to have their production handled by the licensor (often referred to as the \"host broadcaster\" in sports contexts) this is by no means the only model. Other configurations include:"
        - list [ref=f2e532]:
          - listitem [ref=f2e533]:
            - generic [ref=f2e534]: S049
            - strong [ref=f2e535]: "Licensee-Managed Production:"
            - text: in some cases, the licensee (e.g., a major broadcaster or OTT platform) may assume primary responsibility for the production. This often happens if the licensee has substantial in-house production resources or if the licensor opts for a more hands-off approach. The licensee's production team would handle everything from camera operations to the integration of graphics and commentary;
          - listitem [ref=f2e536]:
            - generic [ref=f2e537]: S050
            - strong [ref=f2e538]: "Third-Party or Independent Production:"
            - text: there are instances where an independent production company (contracted by either the licensor, the licensee, or jointly) handles the entire production. This third-party is often chosen for its specialized technical expertise or its track record of producing large-scale broadcasts. The third-party model can help ensure a consistent production standard across multiple licensees;
          - listitem [ref=f2e539]:
            - generic [ref=f2e540]: S051
            - strong [ref=f2e541]: "Shared / Hybrid Models:"
            - text: "in large international sporting events (e.g., Olympics, World Cups, etc.), the organizing body may have a \"host broadcaster\" that provides a baseline \"world feed.\" Licensees can then further customize that feed (adding localized commentary, graphics, and other enhancements) to suit their audience. In these scenarios, production responsibilities are shared: the licensor or organizing body creates a core feed, and licensees' layer on additional elements;"
          - listitem [ref=f2e542]:
            - generic [ref=f2e543]: S052
            - strong [ref=f2e544]: "Local or Regional Network Production:"
            - text: especially for region-specific events (e.g., local sports leagues, concerts, festivals), a regional network may handle the entire production itself. This typically occurs when the regional network holds exclusive local rights. The network's on-site crew will manage everything from camera setup to on-air talent coordination;
          - listitem [ref=f2e545]:
            - generic [ref=f2e546]: S053
            - strong [ref=f2e547]: "Organizer-Managed Production for Niche Events:"
            - text: for smaller or niche events (e.g., certain esports tournaments or smaller sporting leagues), the event organizer itself might manage the entire production pipeline, only selling streaming or broadcast rights to distribution partners. As event owners, they can coordinate all the moving parts internally or via a chosen partner, then deliver a feed to any licensee that buys the rights.
        - paragraph [ref=f2e548]:
          - generic [ref=f2e549]: S054
          - text: In short, while having the licensor provide and manage the live feed is a widespread practice (especially for large, high-profile events) there are various other scenarios where the licensee, a third-party production team, or a hybrid approach can take the lead on production. Thus, for the scope of the present invention, the term "licensor" is used to encompass all the different scenarios just described.
        - paragraph [ref=f2e550]:
          - generic [ref=f2e551]: S055
          - text: Upon completion of these preliminary stages, the licensor transmits one or more mates to the licensees. It is at this juncture that the licensees assume responsibility for the further processing and customization of the content. This includes transcoding and adaptive bitrate streaming, content packaging and encryption, digital rights management (DRM), and the final generation of variegated manifest files. Each licensee, leveraging the received mates, generates a multitude of manifest files, ensuring that each viewer or group of viewers is presented with a slightly different version of the event. This customization is critical for embedding traceable, unique identifiers within the content, thereby significantly enhancing the ability to detect and trace pirated versions. Moreover, the licensees manage the association of specific manifest files with individual users or groups of users. This process involves sophisticated data management and distribution mechanisms, necessitating the use of advanced database technologies or blockchain solutions where appropriate, to ensure immutability, security, and efficient retrieval of data for anti-piracy purposes. It is understood by those skilled in the art that the distribution of responsibilities between the licensor and licensees as described herein is designed to optimize the utilization of the core components of the invention across different entities. This distributed approach allows for the leveraging of specialized expertise and infrastructure of each party, facilitating a collaborative effort in the production, secure distribution, and management of live streaming content.
          - 'button "Indexed by 1 claim fragment(s) of this edition: Solutions and Advantageous effects of the invention · ¶12" [ref=f2e552] [cursor=pointer]': ◂ 1
        - paragraph [ref=f2e553]:
          - generic [ref=f2e554]: S056
          - text: This adaptation of the invention to scenarios involving multiple stakeholders provides a robust framework for ensuring content security and enhancing viewer experience, while also accommodating the complex dynamics of content licensing and distribution in the digital age.
