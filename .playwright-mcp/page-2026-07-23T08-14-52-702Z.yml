        - paragraph [ref=f2e1104]:
          - generic [ref=f2e1105]: S203
          - text: The process of video comparison carried out by said advanced analytics component begins by extracting the middle third of each frame from both the reference video (reference video content) and the mate streaming video (content modified with a mate). This is done to eliminate the top and bottom thirds of the frames, which often contain broadcaster-specific logos, icons, and overlay advertisements, ensuring that these elements do not interfere with the comparison. By focusing on the middle third, said advanced analytics component removes most external differences, allowing for a more accurate comparison of the content itself.
        - generic [ref=f2e1106]:
          - generic [ref=f2e1107]: S204
          - code [ref=f2e1108]: "from PIL import Image def extract_middle_third(image_path): with Image.open(image_path) as im_pil: crop_x1 = 0 crop_x2 = im_pil.width crop_y1 = int(im_pil.height * 0.333) crop_y2 = int(im_pil.height * 0.666) return im_pil.crop((crop_x1, crop_y1, crop_x2, crop_y2))"
        - paragraph [ref=f2e1109]:
          - generic [ref=f2e1110]: S205
          - text: As discussed, said perceptual hash method is adopted by said camera cuts detection algorithm. Said perceptual hash method employs advanced perceptual hashing algorithms that meticulously analyse the visual content of each frame, generating a hash value that encapsulates the essence of the visual information contained therein. Notably, this hash value exhibits a high degree of resilience to subtle alterations affecting the frame, such as resizing or minor distortions, thereby ensuring consistency in the hash value across visually similar frames despite these variations. Consequently, this facilitates the precise identification of frames that are visually akin to one another, effectively addressing the challenge of minor discrepancies between frames from different video sources. As discussed, a fuzzy matching method is further adopted by said camera cuts detection algorithm in some preferred embodiments of the present invention. The fuzzy matching method is implemented through the comparison of perceptual hashes of groups of frames using sliding windows. The fuzzy matching method enables the identification of content matches even in scenarios where commercials or other elements cause temporal shifts in the content.
          - 'button "Indexed by 4 claim fragment(s) of this edition: Example 5 · ¶2" [ref=f2e1111] [cursor=pointer]': ◂ 4
        - generic [ref=f2e1112]:
          - generic [ref=f2e1113]: S206
          - 'button "Indexed by 1 claim fragment(s) of this edition: Example 5 · code 2" [ref=f2e1114] [cursor=pointer]': ◂ 1
          - code [ref=f2e1115]: "def fuzzy_matching(hashes1, hashes2, max_difference, min_match_percentage): num_matches = 0 for hash1 in hashes1: for hash2 in hashes2: if abs(hash1 - hash2) <= max_difference: num_matches += 1 break percentage_match = num_matches / len(hashes1) return percentage_match >= min_match_percentage"
        - paragraph [ref=f2e1116]:
          - generic [ref=f2e1117]: S207
          - text: This automated process, as delineated in the preferred embodiments of the present invention, facilitates the efficient comparison of the mate streaming video with the reference video, thereby pinpointing its specific manifest file. By scrutinizing the timing and characteristics of the altered cuts, this described process empowers the identification of pirated content and the tracing back to its origin, capitalizing on the distinctive features of the anti-piracy system. The deployment of these advanced techniques enables broadcasters and content providers to significantly streamline the detection of unauthorized usage of their content. This automation not only minimizes the necessity for manual intervention but also enhances the precision with which piracy is detected, marking a substantial improvement in the efforts to safeguard intellectual property rights in the digital media landscape.
        - paragraph [ref=f2e1118]:
          - generic [ref=f2e1119]: S208
          - text: According to some embodiments of the present invention, in said monitoring step 280 the detection component 130 leverages said probabilistic fingerprinting algorithm for enhanced accuracy in identifying pirated content and tracing its source.
          - 'button "Indexed by 1 claim fragment(s) of this edition: Example 5 · ¶4" [ref=f2e1120] [cursor=pointer]': ◂ 1
        - paragraph [ref=f2e1121]:
          - generic [ref=f2e1122]: S209
          - text: In the context of enhancing the Automated Video Comparison Process detailed in the preferred embodiments of this invention, it is critical to acknowledge that the methodology is not confined solely to the use of perceptual hashing and fuzzy matching. While these approaches serve as foundational techniques for addressing the challenges of precise video comparison under variable conditions, the invention's framework is designed to be inclusive of a broad array of alternative and supplementary methods that can provide equivalent or superior functionalities for achieving the objectives of the invention.
