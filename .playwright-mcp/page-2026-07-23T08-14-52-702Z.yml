        - paragraph [ref=f2e861]:
          - generic [ref=f2e862]: S165
          - text: "A non-limiting example of a simplified Edit Decision List (EDL) for a reference audio-video content is here provided. The present example shows the subsequent implementation of a mate in the EDL consisting in the application of a delay of 10 frames to a particular camera cut. It is recognized that in practical applications, an EDL encompasses a broader spectrum of information; however, for the sake of clarity in this exposition, our focus will be confined to the core elements: the cut number, the source camera, the in-point (commencement time of the cut), and the out-point (conclusion time of the cut). This simplified representation aims to elucidate the fundamental principles underpinning the operation of the invention in the context of video content management and modification."
